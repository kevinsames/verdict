# Verdict Pipeline Workflow
# Azure Databricks workflow definition for end-to-end LLMOps evaluation
#
# This file is imported by databricks.yml via `include`
#
# Simplified orchestration: All configuration is stored in metadata.pipeline_runs
# and tasks read from that table using run_id instead of passing parameters.
#
# Azure Databricks VM types:
# - Standard_D4ds_v5: 4 vCPUs, 16GB RAM (general purpose)
# - Standard_E4ds_v5: 4 vCPUs, 32GB RAM (memory optimized)

resources:
  jobs:
    verdict_pipeline:
      name: "Verdict: LLM Evaluation Pipeline"
      description: "End-to-end LLM evaluation with regression detection"
      tags:
        project: verdict
        type: llmops
        platform: azure

      git_source:
        git_url: "https://github.com/kevinsames/verdict"
        git_provider: github
        git_branch: main

      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: model_endpoint
          default: ${var.model_endpoint}
        - name: baseline_version
          default: ${var.baseline_version}
        - name: candidate_version
          default: ${var.candidate_version}
        - name: dataset_version
          default: ${var.dataset_version}

      tasks:
        # Task 0: Initialize Run (creates run record with configuration)
        - task_key: init_run
          description: "Initialize pipeline run record"
          notebook_task:
            notebook_path: notebooks/init_run.ipynb
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              model_endpoint: "{{job.parameters.model_endpoint}}"
              baseline_version: "{{job.parameters.baseline_version}}"
              candidate_version: "{{job.parameters.candidate_version}}"
              dataset_version: "{{job.parameters.dataset_version}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 1
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          timeout_seconds: 300

        # Task 1: Initialize Unity Catalog (run once)
        - task_key: init_catalog
          description: "Initialize Unity Catalog tables"
          depends_on:
            - task_key: init_run
          notebook_task:
            notebook_path: notebooks/init_catalog.ipynb
            base_parameters:
              run_id: "{{tasks.init_run.values.run_id}}"
              catalog_name: "{{tasks.init_run.values.catalog_name}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 1
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          timeout_seconds: 600

        # Task 2: Run Inference
        - task_key: inference
          description: "Run inference on model endpoint"
          depends_on:
            - task_key: init_catalog
          notebook_task:
            notebook_path: notebooks/run_inference.ipynb
            base_parameters:
              run_id: "{{tasks.init_run.values.run_id}}"
              catalog_name: "{{tasks.init_run.values.catalog_name}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 2
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          libraries:
            - pypi:
                package: azure-identity>=1.15.0
            - pypi:
                package: azure-keyvault-secrets>=4.7.0
          timeout_seconds: 3600

        # Task 2a: Generate Test Dataset (optional, parallel to inference)
        - task_key: testgen
          description: "Generate RAG test dataset from Qdrant"
          depends_on:
            - task_key: init_catalog
          notebook_task:
            notebook_path: notebooks/run_testgen.ipynb
            base_parameters:
              run_id: "{{tasks.init_run.values.run_id}}"
              catalog_name: "{{tasks.init_run.values.catalog_name}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 1
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          libraries:
            - pypi:
                package: qdrant-client>=1.7.0
            - pypi:
                package: azure-identity>=1.15.0
            - pypi:
                package: pydantic-settings>=2.0.0
          timeout_seconds: 1800

        # Task 3: Run Evaluation
        - task_key: evaluation
          description: "Evaluate responses with MLflow and LLM judge"
          depends_on:
            - task_key: inference
          notebook_task:
            notebook_path: notebooks/run_evaluation.ipynb
            base_parameters:
              run_id: "{{tasks.init_run.values.run_id}}"
              catalog_name: "{{tasks.init_run.values.catalog_name}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_E4ds_v5
            num_workers: 2
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          libraries:
            - pypi:
                package: mlflow>=2.10.0
            - pypi:
                package: azure-identity>=1.15.0
          timeout_seconds: 3600

        # Task 4: Regression Detection
        - task_key: regression
          description: "Detect regressions vs baseline"
          depends_on:
            - task_key: evaluation
          notebook_task:
            notebook_path: notebooks/run_regression.ipynb
            base_parameters:
              run_id: "{{tasks.init_run.values.run_id}}"
              catalog_name: "{{tasks.init_run.values.catalog_name}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 1
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          timeout_seconds: 1800

        # Task 5: Deliver Verdict (Alert)
        - task_key: alert
          description: "Send alert based on verdict"
          depends_on:
            - task_key: regression
          notebook_task:
            notebook_path: notebooks/send_alert.ipynb
            base_parameters:
              run_id: "{{tasks.init_run.values.run_id}}"
              catalog_name: "{{tasks.init_run.values.catalog_name}}"
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 1
            data_security_mode: SINGLE_USER
            azure_attributes:
              first_on_demand: 1
              availability: ON_DEMAND_AZURE
          timeout_seconds: 300

      email_notifications:
        on_failure:
          - verdict-alerts@example.com
        on_success:
          - verdict-alerts@example.com

      queue:
        enabled: true